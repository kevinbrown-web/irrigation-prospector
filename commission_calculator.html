<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sales Rep Comp Calculator</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=DM+Sans:wght@300;400;500&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: #e0ddd6;
    --text: #1a1916;
    --muted: #7a776e;
    --blue: #185FA5;
    --blue-light: #e6f1fb;
    --green: #1D9E75;
    --green-light: #e1f5ee;
    --accent: #185FA5;
    --danger: #c0392b;
  }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1rem;
  }

  .container { max-width: 860px; margin: 0 auto; }

  header { margin-bottom: 2rem; }
  header h1 {
    font-family: 'DM Mono', monospace;
    font-size: 1.1rem;
    font-weight: 500;
    letter-spacing: 0.02em;
    color: var(--text);
    margin-bottom: 4px;
  }
  header p { font-size: 0.85rem; color: var(--muted); }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 1.5rem;
    margin-bottom: 1.25rem;
  }

  .card-label {
    font-family: 'DM Mono', monospace;
    font-size: 0.7rem;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 1rem;
  }

  .input-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 1rem;
  }

  .field label {
    display: block;
    font-size: 0.75rem;
    color: var(--muted);
    margin-bottom: 5px;
  }

  .field input {
    width: 100%;
    padding: 8px 12px;
    border: 1px solid var(--border);
    border-radius: 8px;
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.9rem;
    transition: border-color 0.15s;
    outline: none;
  }

  .field input:focus { border-color: var(--accent); }

  .metric-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1rem;
    margin-bottom: 1.25rem;
  }

  .metric {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 1rem;
  }

  .metric .mlabel { font-size: 0.7rem; color: var(--muted); margin-bottom: 5px; }
  .metric .mval { font-family: 'DM Mono', monospace; font-size: 1.3rem; font-weight: 500; }
  .metric .msub { font-size: 0.68rem; color: var(--muted); margin-top: 3px; }

  .chart-section { margin-bottom: 0.5rem; }

  .legend { display: flex; gap: 1.25rem; margin-bottom: 0.75rem; }
  .leg { display: flex; align-items: center; gap: 6px; font-size: 0.78rem; color: var(--muted); }
  .leg-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

  .bar-row { display: flex; align-items: center; gap: 10px; margin-bottom: 6px; }
  .bar-mo { font-family: 'DM Mono', monospace; font-size: 0.68rem; color: var(--muted); width: 34px; text-align: right; flex-shrink: 0; }
  .bar-group { flex: 1; display: flex; flex-direction: column; gap: 2px; }
  .bar-track { background: var(--bg); border-radius: 4px; height: 17px; overflow: hidden; }
  .bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; padding-left: 8px; transition: width 0.3s ease; }
  .bar-rev { background: var(--blue); }
  .bar-pay { background: var(--green); }
  .bar-val { font-family: 'DM Mono', monospace; font-size: 0.65rem; color: rgba(255,255,255,0.9); white-space: nowrap; }

  .table-wrap { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.78rem;
    min-width: 620px;
  }

  thead th {
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.05em;
    color: var(--muted);
    text-align: right;
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { text-align: left; }

  tbody td {
    text-align: right;
    padding: 7px 10px;
    border-bottom: 1px solid var(--border);
    font-family: 'DM Mono', monospace;
  }
  tbody td:first-child { text-align: left; font-family: 'DM Sans', sans-serif; font-weight: 500; }
  tbody tr:last-child td { border-bottom: none; background: var(--bg); font-weight: 500; }

  .churn-val { color: var(--danger); }
  .pay-val { color: var(--green); font-weight: 500; }

  .divider { border: none; border-top: 1px solid var(--border); margin: 1.25rem 0; }

  @media (max-width: 600px) {
    .metric-grid { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>
<div class="container">

  <header>
    <h1>// comp calculator</h1>
    <p>Commission model · compounding MRR · 12-month projection</p>
  </header>

  <div class="card">
    <div class="card-label">Deal inputs</div>
    <div class="input-grid">
      <div class="field"><label>New deals / month</label><input type="number" id="deals" value="2" min="0" step="1"></div>
      <div class="field"><label>Retainer / deal ($/mo)</label><input type="number" id="retainer" value="500" min="0"></div>
      <div class="field"><label>Shows / month</label><input type="number" id="shows" value="10" min="0"></div>
      <div class="field"><label>Churn rate (%/mo)</label><input type="number" id="churn" value="10" min="0" max="100" step="1"></div>
    </div>
  </div>

  <div class="card">
    <div class="card-label">Comp structure</div>
    <div class="input-grid">
      <div class="field"><label>Show fee ($)</label><input type="number" id="showfee" value="30" min="0"></div>
      <div class="field"><label>Rev share (% of new MRR)</label><input type="number" id="revpct" value="10" min="0" max="100" step="1"></div>
      <div class="field"><label>Recurring cut (% of book)</label><input type="number" id="recpct" value="10" min="0" max="100" step="1"></div>
      <div class="field"><label>Profit share (%/mo)</label><input type="number" id="profpct" value="1" min="0" max="100" step="0.5"></div>
      <div class="field"><label>Monthly profit est. ($)</label><input type="number" id="profit" value="4167" min="0"></div>
    </div>
  </div>

  <div class="metric-grid" id="metrics"></div>

  <div class="card chart-section">
    <div class="card-label">MRR vs. rep pay — month by month</div>
    <div class="legend">
      <div class="leg"><div class="leg-dot" style="background:var(--blue)"></div>Your MRR</div>
      <div class="leg"><div class="leg-dot" style="background:var(--green)"></div>Rep's pay</div>
    </div>
    <div id="bars"></div>
  </div>

  <div class="card">
    <div class="card-label">Full 12-month table</div>
    <div class="table-wrap">
      <table id="tbl"></table>
    </div>
  </div>

</div>

<script>
function getVal(id) { return parseFloat(document.getElementById(id).value) || 0; }
function fmt(n) { return '$' + Math.round(n).toLocaleString(); }
function fmtK(n) { return n >= 1000 ? '$' + (n/1000).toFixed(1) + 'k' : fmt(n); }

function calc() {
  const newDeals = getVal('deals');
  const retainer = getVal('retainer');
  const shows = getVal('shows');
  const churn = getVal('churn') / 100;
  const showFee = getVal('showfee');
  const revPct = getVal('revpct') / 100;
  const recPct = getVal('recpct') / 100;
  const profPct = getVal('profpct') / 100;
  const profit = getVal('profit');

  let activeClients = 0;
  const rows = [];

  for (let m = 1; m <= 12; m++) {
    const churned = Math.round(activeClients * churn);
    activeClients = activeClients - churned + newDeals;
    const mrr = activeClients * retainer;
    const newMRR = newDeals * retainer;
    const existingMRR = mrr - newMRR;

    const showPay = showFee * shows;
    const revPay = revPct * newMRR;
    const recurringPay = recPct * existingMRR;
    const profPay = profPct * profit;
    const totalPay = showPay + revPay + recurringPay + profPay;

    rows.push({ m, activeClients, churned, mrr, newMRR, showPay, revPay, recurringPay, profPay, totalPay });
  }
  return rows;
}

function render() {
  const rows = calc();
  const last = rows[rows.length - 1];
  const totalPay12 = rows.reduce((s, r) => s + r.totalPay, 0);
  const avgPay = totalPay12 / 12;
  const maxClients = Math.max(...rows.map(r => r.activeClients));

  document.getElementById('metrics').innerHTML = `
    <div class="metric"><div class="mlabel">MRR by month 12</div><div class="mval">${fmt(last.mrr)}</div><div class="msub">${last.activeClients} active clients</div></div>
    <div class="metric"><div class="mlabel">Yr 1 total rep pay</div><div class="mval">${fmt(totalPay12)}</div><div class="msub">all 12 months</div></div>
    <div class="metric"><div class="mlabel">Avg monthly pay</div><div class="mval">${fmt(avgPay)}</div><div class="msub">grows over time</div></div>
    <div class="metric"><div class="mlabel">Peak active clients</div><div class="mval">${maxClients}</div><div class="msub">before churn equilibrium</div></div>
  `;

  const scale = Math.max(...rows.map(r => Math.max(r.mrr, r.totalPay)));
  let barsHTML = '';
  rows.forEach(r => {
    const revW = scale > 0 ? Math.round((r.mrr / scale) * 100) : 0;
    const payW = scale > 0 ? Math.round((r.totalPay / scale) * 100) : 0;
    barsHTML += `
      <div class="bar-row">
        <div class="bar-mo">Mo ${r.m}</div>
        <div class="bar-group">
          <div class="bar-track"><div class="bar-fill bar-rev" style="width:${revW}%"><span class="bar-val">${fmtK(r.mrr)}</span></div></div>
          <div class="bar-track"><div class="bar-fill bar-pay" style="width:${payW}%"><span class="bar-val">${fmtK(r.totalPay)}</span></div></div>
        </div>
      </div>`;
  });
  document.getElementById('bars').innerHTML = barsHTML;

  let thead = `<tr>
    <th>Month</th><th>Active</th><th>Churned</th><th>MRR</th>
    <th>Show fee</th><th>New deal %</th><th>Recurring %</th><th>Profit %</th><th>His total</th>
  </tr>`;

  let tbody = rows.map(r => `<tr>
    <td>Mo ${r.m}</td>
    <td>${r.activeClients}</td>
    <td class="churn-val">${r.churned}</td>
    <td>${fmt(r.mrr)}</td>
    <td>${fmt(r.showPay)}</td>
    <td>${fmt(r.revPay)}</td>
    <td>${fmt(r.recurringPay)}</td>
    <td>${fmt(r.profPay)}</td>
    <td class="pay-val">${fmt(r.totalPay)}</td>
  </tr>`).join('');

  const t = rows.reduce((s, r) => ({
    showPay: s.showPay + r.showPay, revPay: s.revPay + r.revPay,
    recurringPay: s.recurringPay + r.recurringPay, profPay: s.profPay + r.profPay, totalPay: s.totalPay + r.totalPay
  }), { showPay:0, revPay:0, recurringPay:0, profPay:0, totalPay:0 });

  tbody += `<tr>
    <td>Total</td><td>—</td><td>—</td><td>—</td>
    <td>${fmt(t.showPay)}</td><td>${fmt(t.revPay)}</td>
    <td>${fmt(t.recurringPay)}</td><td>${fmt(t.profPay)}</td>
    <td class="pay-val">${fmt(t.totalPay)}</td>
  </tr>`;

  document.getElementById('tbl').innerHTML = `<thead>${thead}</thead><tbody>${tbody}</tbody>`;
}

document.querySelectorAll('input').forEach(el => el.addEventListener('input', render));
render();
</script>
</body>
</html>
